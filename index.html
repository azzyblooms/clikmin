<!DOCTYPE html>
<html>
    <head>
        <audio loop autoplay muted id="music">
            <source src="audio/musicboxed.mp3" type="audio/mpeg">
        </audio>
        <link rel="stylesheet" href="style.css"/>
        <link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
        <title id="pagetitle">clikmin: 0 pokos</title>
    </head>
    <body>
        <div id="title">clikmin!!!!!!!</div><div class="jeffdiv"></div>    <div id="coolnumber">0</div>
        <div class="johndiv"></div>
        <div id="totallyclickableyo" class="willshake">
            <button id="clickablemin"></button>
        </div>
        <!--<div class="johndiv"></div>-->
        <div id="rpbox" class="itemcontainer willshake">
            <img id="rpimg" src="images/redpikmin.png" width="50px" height="50px">
            <div class="textarea">
            <span class="boxtext" id="rpamount">x0</span>
            <div class="rpcosttext"><span class="boxtext" id="rptext">RED PIKMIN: </span><span class="boxtext" id="rpcost">15</span></div>
            </div>
        </div>
        <div id="bpbox" class="itemcontainer willshake">
            <img id="bpimg" src="images/bluepikmin.png" width="30px" height="60px">
            <div class="textarea">
            <span class="boxtext" id="bpamount">x0</span>
            <div class="bpcosttext"><span class="boxtext" id="bptext">BLUE PIKMIN: </span><span class="boxtext" id="bpcost">100</span></div>
            </div>
        </div>
        <div id="ypbox" class="itemcontainer willshake">
            <img id="ypimg" src="images/yellowpikmin.png" width="30px" height="60px">
            <div class="textarea">
            <span class="boxtext" id="ypamount">x0</span>
            <div class="ypcosttext"><span class="boxtext" id="yptext">YELLOW PIKMIN: </span><span class="boxtext" id="ypcost">1.1k</span></div>
            </div>
        </div>
        <div id="upgradebigbox">
            <div id="upgradetitle">UPGRADES!</div>
            <div class="cooldiv"></div>
            <div id="upgradesmallbox">
                <div id="redupgrades"> 
                    <div id="ru1" class="ru">1</div>
                </div>
                <div id="blueupgrades"> 
                    <div id="bu1" class="bu">1</div>
                </div>
                <div id="yellowupgrades"> 
                    <div id="yu1" class="yu">1</div>
                </div>
                <div id="genericupgrades"> 
                    <div id="gu1" class="gu">1</div>
                </div>
                <div id="clickupgrades"> 
                    <div id="cu1" class="cu">1</div>
                </div>
            </div>
        </div>
        <button id="togglemute"></button>





        <script src="clikmin.js"></script>
    </body>


</html>
