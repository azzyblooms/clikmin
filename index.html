<!DOCTYPE html>
<html>
    <head>
        <audio loop autoplay muted id="music">
            <source src="audio/musicboxed.mp3" type="audio/mpeg">
        </audio>
        <link rel="stylesheet" href="style.css"/>
        <link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
        <title id="pagetitle">clikmin: 0 pokos</title>
    </head>
    <body>
        <div id="title">clikmin!!!!!!!</div><div class="jeffdiv"></div>    <div id="coolnumber">0</div>
        <div id="totallyclickableyo" class="willshake">
            <button id="clickablemin"></button>
        </div>
        <!--<div class="johndiv"></div>-->
        <div id="rpbox" class="itemcontainer willshake">
            <img class="rpimg" src="images/redpikmin.png" width="50px" height="50px">
            <div class="textarea">
            <span class="boxtext" id="rpamount">x0</span>
            <div class="rpcosttext"><span class="boxtext" id="rptext">RED PIKMIN: </span><span class="boxtext" id="rpcost">15</span></div>
            </div>
        </div>
        <div id="bpbox" class="itemcontainer willshake">
            <img class="bpimg" src="images/bluepikmin.png" width="30px" height="60px">
            <div class="textarea">
            <span class="boxtext" id="bpamount">x0</span>
            <div class="bpcosttext"><span class="boxtext" id="bptext">BLUE PIKMIN: </span><span class="boxtext" id="bpcost">100</span></div>
            </div>
        </div>
        <div id="ypbox" class="itemcontainer willshake">
            <img class="ypimg" src="images/yellowpikmin.png" width="30px" height="60px">
            <div class="textarea">
            <span class="boxtext" id="ypamount">x0</span>
            <div class="ypcosttext"><span class="boxtext" id="yptext">YELLOW PIKMIN: </span><span class="boxtext" id="ypcost">1.1k</span></div>
            </div>
        </div>
        <div id="upgradebigbox">
            <div id="upgradetitle">UPGRADES!</div>
            <div class="cooldiv"></div>
            <div id="upgradesmallbox">
                <div id="redupgrades" class="upgrademenu"> 
                    <div id="ru1" class="ru u">1</div>
                    <div id="ru2" class="ru u">2</div>
                    <div id="ru3" class="ru u">3</div>
                    <img class="rpimg" src="images/redpikmin.png" width="32px" height="32px">
                </div>
                <div id="blueupgrades" class="upgrademenu"> 
                    <div id="bu1" class="bu u">1</div>
                    <div id="bu2" class="bu u">2</div>
                    <div id="bu3" class="bu u">3</div>
                    <img class="bpimg" src="images/bluepikmin.png" width="30px" height="60px">
                </div>
                <div id="yellowupgrades" class="upgrademenu"> 
                    <div id="yu1" class="yu u">1</div>
                    <div id="yu2" class="yu u">2</div>
                    <div id="yu3" class="yu u">3</div>
                    <img class="ypimg" src="images/yellowpikmin.png" width="30px" height="60px">
                </div>
                <div id="genericupgrades" class="upgrademenu"> 
                    <div id="gu1" class="gu u">1</div>
                    <div id="gu2" class="gu u">2</div>
                    <div id="gu3" class="gu u">3</div>
                    <img class="pokoimg" src="images/poko.png" width="32px" height="32px">
                </div>
                <div id="clickupgrades" class="upgrademenu"> 
                    <div id="cu1" class="cu u">1</div>
                    <div id="cu2" class="cu u">2</div>
                    <div id="cu3" class="cu u">3</div>
                    <img class="cursorimg" src="images/cursor.png" width="32px" height="32px">
                </div>
            </div>
        </div>
        <button id="togglemute"></button>





        <script src="clikmin.js"></script>
    </body>


</html>
